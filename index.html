<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ring Chase</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ring Chase">
<meta name="theme-color" content="#18120d">
<style>
  html,body{margin:0;padding:0;background:#0a0806;height:100%;overflow:hidden;
            touch-action:none;-webkit-user-select:none;user-select:none;}
  body{display:flex;flex-direction:column;}
  #wrap{display:flex;align-items:center;justify-content:center;flex:1 1 auto;min-height:0;}
  body.touch #wrap{padding-top:env(safe-area-inset-top, 0px);box-sizing:border-box;
       align-items:flex-start;}
  canvas{image-rendering:pixelated;image-rendering:crisp-edges;}
  #ui{display:none;position:fixed;top:8px;left:50%;transform:translateX(-50%);color:#e8d8b0;
      font-family:monospace;font-size:13px;text-align:center;opacity:.85;pointer-events:none;
      text-shadow:1px 1px 0 #000;white-space:nowrap;max-width:96vw;overflow:hidden;}
  /* ---- touch controls: fixed-height bar at the bottom (portrait phones) ---- */
  #pad{display:none;position:relative;flex:0 0 auto;
       height:calc(var(--u)*3 + 28px + env(safe-area-inset-bottom, 0px));
       background:#18120d;border-top:3px solid #2c2118;box-sizing:border-box;
       padding-bottom:env(safe-area-inset-bottom, 0px);}
  body.touch #pad{display:block;}
  body.touch #ui{display:none;}
  /* left: traditional d-pad (whole zone touchable, slide between arms) */
  #pad{--u:clamp(40px, 14.5vw, 64px);        /* d-pad arm size */
       --ab:clamp(58px, 18.5vw, 92px);}      /* action button size */
  #stickzone{position:absolute;left:0;top:0;width:52%;height:calc(100% - env(safe-area-inset-bottom, 0px));}
  #dpad{position:absolute;left:50%;top:14px;transform:translateX(-50%);
        width:calc(var(--u)*3);height:calc(var(--u)*3);}
  .darm{position:absolute;width:var(--u);height:var(--u);background:#2e241a;
        display:flex;align-items:center;justify-content:center;color:#a08a68;
        box-shadow:0 3px 0 #0a0705, inset 0 1px 0 rgba(255,235,200,.07);}
  .darm svg{width:55%;height:55%;}
  .darm.on{background:#3a2d1e;color:#f0e0c0;transform:translateY(2px);box-shadow:0 1px 0 #0a0705;}
  #d-up{left:var(--u);top:0;border-radius:10px 10px 0 0;}
  #d-down{left:var(--u);top:calc(var(--u)*2);border-radius:0 0 10px 10px;}
  #d-left{left:0;top:var(--u);border-radius:10px 0 0 10px;}
  #d-right{left:calc(var(--u)*2);top:var(--u);border-radius:0 10px 10px 0;}
  #d-mid{left:var(--u);top:var(--u);box-shadow:none;border-radius:0;background:#2e241a;}
  #d-mid::after{content:'';position:absolute;left:33%;top:33%;width:34%;height:34%;
        border-radius:50%;background:#1c1610;}
  /* right: action buttons */
  #btnzone{position:absolute;right:0;top:0;width:48%;height:calc(100% - env(safe-area-inset-bottom, 0px));}
  #btns{position:absolute;right:clamp(8px,4vw,26px);top:calc(14px + var(--u)*1.5);
        transform:translateY(-50%) rotate(-18deg);
        width:calc(var(--ab)*2.3);height:calc(var(--ab)*1.25);}
  .ab{position:absolute;width:var(--ab);height:var(--ab);border-radius:50%;
      background:#8e3030;color:#f0d8c8;font-family:monospace;font-weight:bold;
      font-size:calc(var(--ab)*0.35);
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 4px 0 #4a1414, inset 0 -4px 8px rgba(0,0,0,.25);}
  .ab.on{transform:translateY(3px);box-shadow:0 1px 0 #4a1414, inset 0 -2px 6px rgba(0,0,0,.3);}
  #btnB{left:0;top:calc(var(--ab)*0.28);}
  #btnA{left:calc(var(--ab)*1.3);top:0;}
  #pausebtn{position:absolute;right:clamp(8px,4vw,26px);bottom:2px;
        display:flex;align-items:center;gap:7px;
        padding:8px clamp(12px,4vw,22px);border-radius:14px;background:#241c14;color:#8a7758;
        font-family:monospace;font-size:12px;letter-spacing:2px;box-shadow:0 3px 0 #0a0705;}
  #pausebtn svg{width:15px;height:15px;}
  #pausebtn.on{transform:translateY(2px);box-shadow:0 1px 0 #0a0705;}
</style>
</head>

<div id="wrap"><canvas id="cv"></canvas></div>

  <div id="stickzone">

      <div class="darm" id="d-mid"></div>
      <div class="darm" id="d-right"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6l-6 6"/></svg></div>
      <div class="darm" id="d-down"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6l6 -6"/></svg></div>
    </div>
  </div>
  <div id="btnzone">
    <div id="btns">
      <div class="ab" id="btnB">B</div>
      <div class="ab" id="btnA">A</div>
    </div>

  </div>
</div>

// ---------- sprite decoding ----------
function decode(s){
  const c = document.createElement('canvas');
  c.width = s.w; c.height = s.h;
  const g = c.getContext('2d');
  const img = g.createImageData(s.w, s.h);
  for(let y=0;y<s.h;y++)for(let x=0;x<s.w;x++){
    const k = s.px[y][x];
    if(k<0) continue;
    const o = (y*s.w+x)*4, p = s.pal[k];
    img.data[o]=p[0]; img.data[o+1]=p[1]; img.data[o+2]=p[2]; img.data[o+3]=255;
  }
  g.putImageData(img,0,0);
  return c;
}

// ---------- dirt texture ----------
function makeDirt(grid){
  // texture matched to the source screenshots: dark chocolate base,
  // small warm squiggle speckles (2-3px), ragged bitten edges
  const ROWS=grid.length, COLS=grid[0].length;
  const solidCell=(i,j)=>(i<0||j<0||i>=COLS||j>=ROWS)?true:grid[j][i]===1;
  const c = document.createElement('canvas');
  c.width = COLS*T; c.height = ROWS*T;
  const g = c.getContext('2d');
  let seed = 987654321;
  const rnd = ()=> (seed = (seed*1103515245+12345)&0x7fffffff)/0x7fffffff;
  const BG = '#070402';
  const PX = 6;   // soft chunky dirt pixels (the look you liked)
  for(let j=0;j<ROWS;j++)for(let i=0;i<COLS;i++){
    if(!solidCell(i,j)) continue;
    for(let y=j*T;y<(j+1)*T;y+=PX)for(let x=i*T;x<(i+1)*T;x+=PX){
      const r = rnd();
      let col;
      if(r<0.42) col='#4c2c10';
      else if(r<0.68) col='#553314';
      else if(r<0.85) col='#5f3a18';
      else if(r<0.95) col='#6c451f';
      else col='#7d5428';
      g.fillStyle = col;
      g.fillRect(x,y,PX,PX);
    }
  }
  // ragged bitten edges toward corridors
  g.fillStyle = BG;
  for(let j=0;j<ROWS;j++)for(let i=0;i<COLS;i++){
    if(!solidCell(i,j)) continue;
    for(const [dx,dy] of [[0,-1],[0,1],[-1,0],[1,0]]){
      if(solidCell(i+dx,j+dy)) continue;
      for(let k=0;k<T;){
        const run = 2+(rnd()*4|0);            // notch length
        if(rnd()<0.5){
          const depth = 1+(rnd()*2|0);        // notch depth
          let x,y,w,h;
          if(dy===-1){x=i*T+k;y=j*T;w=run;h=depth;}
          else if(dy===1){x=i*T+k;y=(j+1)*T-depth;w=run;h=depth;}
          else if(dx===-1){x=i*T;y=j*T+k;w=depth;h=run;}
          else {x=(i+1)*T-depth;y=j*T+k;w=depth;h=run;}
          g.fillRect(x,y,w,h);
        }
        k += run + 2 + (rnd()*3|0);
      }
    }
  }
  return c;
}
const DIRT_CACHE=new Map();
function dirtFor(grid){
  if(!DIRT_CACHE.has(grid)) DIRT_CACHE.set(grid, makeDirt(grid));
  return DIRT_CACHE.get(grid);
}

// normal n: unit vector pointing away from surface into open space
// facing: +1/-1 along tangent; tangent(n) = rotate n by +90deg (clockwise on screen)
const tangent = n => ({x:-n.y, y:n.x});
function keyOf(n){ return n.x+','+n.y; }

    this.n={x:0,y:-1};                // standing on floor

    // keep running forward so corners flow continuously

      this.v *= 0.86;
      if(Math.abs(this.v) < 0.06) this.v = 0;
    }
  }

    if(this.air) return;

    this.ln = {...this.n};              // launch normal (gravity pulls back toward it)
    this.jheld = true;
    const t=this.t;
    this.ax = this.n.x*J + t.x*this.v;
    this.ay = this.n.y*J + t.y*this.v;
    this.x += this.n.x*3; this.y += this.n.y*3;
  }
  airControl(ix,iy){
    if(!this.air) return;
    const t = tangent(this.ln);
    const proj = ix*t.x + iy*t.y;
    if(proj!==0){
      this.ax += t.x*proj*0.14;
      this.ay += t.y*proj*0.14;
      // clamp tangential air speed
      const tv = this.ax*t.x + this.ay*t.y;
      const cl = Math.max(-3.4, Math.min(3.4, tv));
      this.ax += t.x*(cl-tv); this.ay += t.y*(cl-tv);
    }
  }
  step(){
    if(this.air){
      // Mario-style gravity: pulls back toward the surface we jumped from;
      // lighter while rising with jump held (variable height)
      const ln = this.ln || {x:0,y:-1};
      const upVel = this.ax*ln.x + this.ay*ln.y;   // velocity away from surface
      const g = (this.jheld && upVel>0) ? 0.16 : 0.32;
      this.ax -= ln.x*g; this.ay -= ln.y*g;
      // terminal velocity
      const fall = -(this.ax*ln.x + this.ay*ln.y);
      if(fall>5.5){ this.ax += ln.x*(fall-5.5); this.ay += ln.y*(fall-5.5); }
      const steps = Math.ceil(Math.max(Math.abs(this.ax),Math.abs(this.ay))/2);
      for(let s=0;s<steps;s++){
        const nx=this.x+this.ax/steps, ny=this.y+this.ay/steps;
        if(solidAt(nx,ny)){
          // land: determine the crossed face from cell transitions (robust wall-stick)
          const pcx=Math.floor(this.x/T), pcy=Math.floor(this.y/T);
          const hcx=Math.floor(nx/T),    hcy=Math.floor(ny/T);
          let n;
          const crossedX = hcx!==pcx, crossedY = hcy!==pcy;
          if(crossedX && !crossedY)      n={x:pcx<hcx?-1:1, y:0};
          else if(crossedY && !crossedX) n={x:0, y:pcy<hcy?-1:1};
          else if(crossedX && crossedY){
            // diagonal corner: attach to the face we penetrated least
            const fx = pcx<hcx ? (nx - hcx*T) : (hcx+1)*T - nx;
            const fy = pcy<hcy ? (ny - hcy*T) : (hcy+1)*T - ny;
            n = fx<fy ? {x:pcx<hcx?-1:1,y:0} : {x:0,y:pcy<hcy?-1:1};
          } else {
            // started overlapping (shouldn't happen): push back opposite of motion
            n = Math.abs(this.ax)>Math.abs(this.ay)
              ? {x:Math.sign(-this.ax)||0,y:0} : {x:0,y:Math.sign(-this.ay)||-1};
          }
          this.n=n; this.air=false;
          // keep some tangential momentum
          const t=tangent(n);
          this.v = this.ax*t.x + this.ay*t.y;
          this.face = this.v===0 ? this.face : Math.sign(this.v);
          // snap feet onto the face of the cell we hit
          this.landSnap(nx,ny);
          return;
        }
        this.x=nx; this.y=ny;
        if(this.x<2||this.y<2||this.x>WNAT-2||this.y>HNAT-2){ // clamp inside
          this.x=Math.max(2,Math.min(WNAT-2,this.x));
          this.y=Math.max(2,Math.min(HNAT-2,this.y));
        }
      }
      return;
    }
    this.turnT++;
    if(this.v===0){ this.animT=0; return; }
    let remain = Math.abs(this.v);
    const dir = Math.sign(this.v);
    let guard = 12;
    while(remain>0.0001 && guard-->0){
      const t=this.t;
      const dx=t.x*dir, dy=t.y*dir;
      // distance to next tile boundary along movement axis
      const posAlong = dx!==0 ? this.x : this.y;
      const d = dx+dy>0 ? (Math.floor(posAlong/T)+1)*T - posAlong
                        : posAlong - (Math.ceil(posAlong/T)-1)*T;
      const stepd = Math.min(remain, Math.max(d, 0.0001));
      let nx = this.x+dx*stepd, ny=this.y+dy*stepd;
      // wall ahead? (inner corner) probe slightly above surface, ahead of feet
      const aheadX = nx + dx*6 + this.n.x*4;
      const aheadY = ny + dy*6 + this.n.y*4;
      if(solidAt(aheadX,aheadY)){
        // advance right up to the wall face, then turn up it
        const probeAlong = dx!==0 ? aheadX : aheadY;
        const wallPlane = dx+dy>0 ? Math.floor(probeAlong/T)*T : (Math.floor(probeAlong/T)+1)*T;
        const stopAt = wallPlane - (dx+dy>0?1:-1)*6;
        if(dx!==0) this.x = stopAt; else this.y = stopAt;
        // inner turn: new normal = -travel, new travel dir = old normal
        const wouldN = {x:-dx, y:-dy};
        if(this.turnT<10 && this.prevN && wouldN.x===this.prevN.x && wouldN.y===this.prevN.y){
          this.v=0; break;                       // would undo the last turn: park at the corner
        }
        const on = {...this.n};
        this.prevN = on; this.turnT = 0;
        this.n = wouldN;
        const nt = this.t;
        const newDir = Math.sign(on.x*nt.x + on.y*nt.y);
        this.v = Math.abs(this.v)*newDir*0.85;   // ease into the turn
        this.face = newDir;
        remain -= stepd;
        continue;
      }
      // ground below? probe just under surface at new pos
      const underX = nx - this.n.x*4, underY = ny - this.n.y*4;
      if(!solidAt(underX,underY)){
        // outer corner: wrap around
        const boundary = Math.round((dx!==0?nx:ny)/T)*T;
        const wouldN = {x:dx, y:dy};
        if(this.turnT<10 && this.prevN && wouldN.x===this.prevN.x && wouldN.y===this.prevN.y){
          // would undo the last turn: park just inside the corner instead
          if(dx!==0) this.x = boundary - dx; else this.y = boundary - dy;
          this.v=0; break;
        }
        if(dx!==0) this.x = boundary; else this.y = boundary;
        const on={...this.n};
        this.prevN = on; this.turnT = 0;
        this.n = wouldN;                       // new normal = old travel dir
        const nt=this.t;
        const newDir = Math.sign((-on.x)*nt.x + (-on.y)*nt.y);
        this.v = Math.abs(this.v)*newDir*0.85; // ease around the corner
        this.face = newDir;
        // nudge around the corner
        this.x += nt.x*newDir*4 ; this.y += nt.y*newDir*4;
        remain -= stepd;
        continue;
      }
      this.x=nx; this.y=ny;
      remain -= stepd;
    }
    this.snap();
    this.animT += Math.abs(this.v);
  }
  snap(){
    // feet always sit on a tile boundary along the normal axis
    if(this.n.x!==0) this.x = Math.round(this.x/T)*T;
    else this.y = Math.round(this.y/T)*T;
  }
  landSnap(hitX,hitY){
    // snap contact point onto the face of the solid cell that was hit
    if(this.n.x!==0){
      const ci = Math.floor(hitX/T);
      this.x = this.n.x>0 ? (ci+1)*T : ci*T;
    } else {
      const cj = Math.floor(hitY/T);
      this.y = this.n.y>0 ? (cj+1)*T : cj*T;
    }
  }
}

// blue replays red's history with a time delay (dynamic stretch),
// but never closer than a minimum gap (no overlapping)
const trail=[]; const DELAY=34, MIN_GAP=46;
function trailFollow(){
  if(trail.length<2) return null;
  const last=trail.length-1;
  const idxDelay = last-DELAY;               // time-delayed point
  // furthest-forward index that still keeps MIN_GAP of path distance
  let acc=0, idxGap=-1;
  for(let i=last;i>0;i--){
    acc += Math.hypot(trail[i].x-trail[i-1].x, trail[i].y-trail[i-1].y);
    if(acc>=MIN_GAP){ idxGap=i-1; break; }
  }
  if(idxGap<0) return null;                  // red hasn't travelled far enough yet
  if(idxDelay<0) return trail[Math.min(idxGap,0)]||trail[0];
  return trail[Math.min(idxDelay, idxGap)];
}

// BFS distances from each player's cell (recomputed periodically)
let distR=null, distB=null;
function bfsFrom(w){
  const pi=Math.max(0,Math.min(NI-1,Math.floor(w.x/T)));
  const pj=Math.max(0,Math.min(NJ-1,Math.floor(w.y/T)));
  const d=Array.from({length:NJ},()=>Array(NI).fill(-1));
  const q=[[pi,pj]]; d[pj][pi]=0;
  while(q.length){
    const [i,j]=q.shift();
    for(const[di,dj] of [[1,0],[-1,0],[0,1],[0,-1]]){
      const ni2=i+di,nj2=j+dj;
      if(ni2<0||nj2<0||ni2>=NI||nj2>=NJ) continue;
      if(LAY.maze[nj2][ni2]===1||d[nj2][ni2]>=0) continue;
      d[nj2][ni2]=d[j][i]+1; q.push([ni2,nj2]);
    }
  }
  return d;
}

function togglePause(){
  if(state==='play'){ state='paused'; pauseSel=0; }

addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  if(e.repeat) return;
  if(state==='title'){
    if(['KeyM','KeyH'].includes(e.code)) return;
    const c=e.code;
    if(['ArrowUp','KeyW'].includes(c)) titleNav(0,-1);
    else if(['ArrowDown','KeyS'].includes(c)) titleNav(0,1);
    else if(['ArrowLeft','KeyA'].includes(c)) titleNav(-1,0);
    else if(['ArrowRight','KeyD'].includes(c)) titleNav(1,0);
    else if(['Space','Enter'].includes(c)) titleAdvance();
    else if(['Escape','Backspace'].includes(c)) titleBack();
    return;
  }
  if(state==='play'){
    const t=kbTarget();
    if(e.code==='Space') t.jump(J);
    // Up/W also jump, but only when standing on a floor (on walls they mean "run up")
    if((e.code==='ArrowUp'||e.code==='KeyW') && t.n.y===-1 && !t.air) t.jump(J);
    if(e.code==='KeyP'||e.code==='Escape') togglePause();
  } else if(state==='paused'){
    if(['ArrowUp','KeyW','ArrowDown','KeyS'].includes(e.code)) pauseSel=(pauseSel+1)%2;
    else if(['Space','Enter'].includes(e.code)) pauseConfirm();
    else if(e.code==='KeyP'||e.code==='Escape') state='play';
  } else if(state==='won'){
    if(['Space','Enter','KeyR'].includes(e.code)) reset();
  }
});

  keys[e.code]=false;
  if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW') kbTarget().jheld=false;
});

const SEMI={C:0,D:2,E:4,F:5,G:7,A:9,B:11};
function freq(n){
  const m=n.match(/^([A-G])(b|#)?(\d)$/);
  let s=SEMI[m[1]]+(m[2]==='b'?-1:m[2]==='#'?1:0);
  const midi=(+m[3]+1)*12+s;
  return 440*Math.pow(2,(midi-69)/12);
}

let actx=null, music=null;
function pulseWave(ctx,duty){
  const N=32, real=new Float32Array(N), imag=new Float32Array(N);
  for(let n=1;n<N;n++) imag[n]=(2/(n*Math.PI))*Math.sin(n*Math.PI*duty);
  return ctx.createPeriodicWave(real,imag,{disableNormalization:false});
}
function initAudio(){
  if(actx) return;
  actx=new (window.AudioContext||window.webkitAudioContext)();
  const master=actx.createGain(); master.gain.value=0.9; master.connect(actx.destination);
  music={master, muted:false, ptr:[0,0,0], loopStart:actx.currentTime+0.1,
         chans:[
           {ev:MEL, wave:pulseWave(actx,0.25), vol:0.145, type:'custom'},
           {ev:HRM, wave:pulseWave(actx,0.5),  vol:0.085, type:'custom'},
           {ev:BAS, wave:null,                 vol:0.20,  type:'triangle'},
         ]};
  setInterval(schedule,60);
}
function playNote(ch,when,dur,note){
  const o=actx.createOscillator(), g=actx.createGain();
  if(ch.type==='custom') o.setPeriodicWave(ch.wave); else o.type=ch.type;
  o.frequency.value=freq(note);
  const end=when+dur*EIGHTH*0.92;
  g.gain.setValueAtTime(ch.vol,when);
  g.gain.setValueAtTime(ch.vol,Math.max(when,end-0.03));
  g.gain.linearRampToValueAtTime(0.0001,end);
  o.connect(g); g.connect(music.master);
  o.start(when); o.stop(end+0.02);
}
function schedule(){
  if(!music||music.muted||(state!=='play'&&state!=='title')) return;
  const ahead=actx.currentTime+0.18;
  for(let c=0;c<3;c++){
    const ch=music.chans[c], ev=ch.ev;
    let guard=64;
    while(guard-->0){
      const i=music.ptr[c]%ev.length;
      const lap=Math.floor(music.ptr[c]/ev.length);
      const t=music.loopStart+(ev[i][0]+lap*LOOP_LEN)*EIGHTH;
      if(t>ahead) break;
      if(t>actx.currentTime-0.05) playNote(ch,Math.max(t,actx.currentTime+0.01),ev[i][1],ev[i][2]);
      music.ptr[c]++;
    }
  }
}
function jingle(){

// --- WebHID fallback for retro pads whose d-pad is broken in the Gamepad API ---
// (e.g. DragonRise SNES clones where left/right never reach the browser).
// Press H once: pick the controller, then follow the two calibration prompts.
const hid={dev:null,map:null,rest:null,x:0,y:0,calib:null,hold:null};
function hidSetHint(t){ ui.textContent=t; }
async function hidConnect(){
  if(!navigator.hid){ hidSetHint('This browser has no WebHID - use keyboard controls'); return; }
  try{
    const devs=await navigator.hid.requestDevice({filters:[]});
    if(!devs.length) return;
    hid.dev=devs[0];
    if(!hid.dev.opened) await hid.dev.open();
    const key='hidmap_'+hid.dev.vendorId+'_'+hid.dev.productId;
    let saved=null;
    try{ saved=JSON.parse(localStorage.getItem(key)||'null'); }catch(e){}
    hid.map=saved; hid.rest=null;
    hid.calib=saved?null:{stage:0,t:0,key};
    hid.dev.oninputreport=ev=>{
      const d=new Uint8Array(ev.data.buffer);
      if(!hid.rest){ hid.rest=[...d]; return; }
      if(hid.calib) hidCalibrate(d);
      else if(hid.map) hidApply(d);
    };
    if(hid.calib) hidSetHint('CALIBRATE: hold d-pad RIGHT until confirmed...');
    else hidSetHint('retro pad linked! d-pad ready');
  }catch(e){ hidSetHint('controller link cancelled'); }
}
function hidDeviation(d){
  for(let i=0;i<Math.min(d.length,hid.rest.length);i++){
    const dv=d[i]-hid.rest[i];
    if(Math.abs(dv)>40) return {i,val:d[i],sign:Math.sign(dv)};
  }
  return null;
}
function hidCalibrate(d){
  const dev=hidDeviation(d);
  const c=hid.calib;
  if(dev){
    if(c.cand && c.cand.i===dev.i && c.cand.sign===dev.sign) c.t++;
    else { c.cand=dev; c.t=1; }
    if(c.t>25){                                  // held steadily
      if(c.stage===0){
        c.xi=dev.i; c.xSign=dev.sign;
        c.stage=1; c.cand=null; c.t=-40;         // debounce gap
        hidSetHint('Good! now hold d-pad DOWN until confirmed...');
      } else {
        hid.map={xi:c.xi,xSign:c.xSign,yi:dev.i,ySign:dev.sign,rest:[...hid.rest]};
        try{ localStorage.setItem(c.key, JSON.stringify(hid.map)); }catch(e){}
        hid.calib=null;
        hidSetHint('retro pad calibrated! go catch the ring');
      }
    }
  } else if(c.t>0) c.t=0;
}
function hidApply(d){
  const m=hid.map;
  const dx=d[m.xi]-m.rest[m.xi], dy=d[m.yi]-m.rest[m.yi];
  hid.x=Math.abs(dx)>40?(Math.sign(dx)===m.xSign?1:-1):0;
  hid.y=Math.abs(dy)>40?(Math.sign(dy)===m.ySign?1:-1):0;
}
addEventListener('keydown',e=>{ if(e.code==='KeyH') hidConnect(); });

function pollPads(){
  const out=[];
  const pads=navigator.getGamepads?navigator.getGamepads():[];
  for(const p of pads){
    if(!p||!p.connected) continue;
    const dz=0.3, ax=p.axes[0]||0, ay=p.axes[1]||0;
    let gx=Math.abs(ax)>dz?Math.sign(ax):0;
    let gy=Math.abs(ay)>dz?Math.sign(ay):0;
    if(out.length===0 && hid.map){
      // calibrated raw-HID d-pad override for the linked retro pad (first pad)
      gx=hid.x; gy=hid.y;
    } else {
      if(p.buttons[14]&&p.buttons[14].pressed) gx=-1;   // d-pad left
      if(p.buttons[15]&&p.buttons[15].pressed) gx=1;    // d-pad right
      if(p.buttons[12]&&p.buttons[12].pressed) gy=-1;   // d-pad up
      if(p.buttons[13]&&p.buttons[13].pressed) gy=1;    // d-pad down
    }
    const a=!!(p.buttons[0]&&p.buttons[0].pressed);   // A (advance/confirm)
    const b=!!(p.buttons[1]&&p.buttons[1].pressed);   // B (back)
    const jump=a||b;                                  // either jumps in-game
    const start=!!(p.buttons[9]&&p.buttons[9].pressed);
    out.push({gx,gy,a,b,jump,start});
  }
  return out;
}

// ---------- title screen ----------
// AI red chases the ring around the logo island forever; blue tags along.
// Rubber-band keeps the ring just out of reach; direction and pace vary.
let tRed=null, tRing=null;
const tSt = {surge:0, redDir:1, ringDir:1};
// island rect in world px (set per layout when the title opens)
let ISL={x0:0,x1:0,y0:0,y1:0}, ISLW=0, ISLH=0, ISLP=0;
function enterTitle(lay){
  LAY=lay;
  setWorld(LAY.title);
  ISL={x0:LAY.isl.i0*T, x1:(LAY.isl.i1+1)*T, y0:LAY.isl.j0*T, y1:(LAY.isl.j1+1)*T};
  ISLW=ISL.x1-ISL.x0; ISLH=ISL.y1-ISL.y0; ISLP=2*(ISLW+ISLH);
  tRed = new Walker(ISL.x0+ISLW*0.28, LAY.isl.j0*T);   // on top of the island
  tRing= new Walker(ISL.x0+ISLW*0.72, LAY.isl.j0*T);
  tSt.surge=0;
  tSt.redDir=tSt.ringDir = Math.random()<0.5?1:-1;  // vary starting direction
  tRed.face=tSt.redDir;  tRed.v=2.5*tSt.redDir;
  tRing.face=tSt.ringDir; tRing.v=2.9*tSt.ringDir;
  trail.length=0;
  titlePhase='menu';
  state='title';
  if(music&&actx){ music.ptr=[0,0,0]; music.loopStart=actx.currentTime+0.15; }
}
function perimS(w){
  if(w.n.y===-1) return w.x-ISL.x0;                       // top
  if(w.n.x===1)  return ISLW + (w.y-ISL.y0);              // right
  if(w.n.y===1)  return ISLW+ISLH + (ISL.x1-w.x);         // bottom
  return ISLW+ISLH+ISLW + (ISL.y1-w.y);                   // left
}
function titleUpdate(){
  const lead=(perimS(tRing)-perimS(tRed)+ISLP)%ISLP;      // ring's lead ahead of red (+s)
  const gap=Math.min(lead, ISLP-lead);                    // shortest way around
  // pick directions with hysteresis: ring flees the short way, red chases it
  if(lead < ISLP*0.44){ tSt.ringDir=1;  tSt.redDir=1; }
  else if(lead > ISLP*0.56){ tSt.ringDir=-1; tSt.redDir=-1; }
  // ring speed: rubber band, never catchable
  let rs = gap<95 ? 3.7 : gap<160 ? 3.0 : gap>330 ? 2.0 : 2.6;
  if(gap<75) rs = Math.abs(tRed.v)+1.2;
  if(tSt.surge>0){ rs+=0.9; tSt.surge--; }
  else if(Math.random()<0.004) tSt.surge=50+Math.random()*70;   // playful sprint
  tRing.v += (tSt.ringDir*rs - tRing.v)*0.09;
  tRing.face=Math.sign(tRing.v)||1;
  tRing.step();
  // red barrels after it (a touch slower on average)
  tRed.v += (tSt.redDir*2.9 - tRed.v)*0.055;
  tRed.face=Math.sign(tRed.v)||1;
  tRed.animT+=Math.abs(tRed.v);
  tRed.step();
  trail.push({x:tRed.x,y:tRed.y,n:{...tRed.n},face:tRed.face,animT:tRed.animT});
  if(trail.length>400) trail.shift();
}

// ---------- ring AI ----------
function ringStep(){
  // target cell center
  const cx=(ring.tx+0.5)*T, cy=(ring.ty+0.5)*T;
  const dx=cx-ring.x, dy=cy-ring.y;
  const d=Math.hypot(dx,dy);
  if(d<ring.speed){
    ring.x=cx; ring.y=cy;
    // choose next cell: maximize dist from player, avoid reversing
    let best=null, bestScore=-1e9;
    const opts=[];
    for(const[di,dj] of [[1,0],[-1,0],[0,1],[0,-1]]){
      const ni2=ring.tx+di, nj2=ring.ty+dj;
      if(ni2<0||nj2<0||ni2>=NI||nj2>=NJ||LAY.maze[nj2][ni2]===1) continue;
      const dR=(distR&&distR[nj2][ni2]>=0)?distR[nj2][ni2]:0;
      const dB=(distB&&distB[nj2][ni2]>=0)?distB[nj2][ni2]:dR;
      let score=Math.min(dR,dB);          // flee whichever player is closer
      const D=curDiff();
      if(D.esc){
        // seek junctions, avoid dead-ends (harder to trap) — intelligence lever
        let deg=0;
        for(const[ei,ej] of [[1,0],[-1,0],[0,1],[0,-1]]){
          const ai=ni2+ei, aj=nj2+ej;
          if(ai>=0&&aj>=0&&ai<NI&&aj<NJ&&LAY.maze[aj][ai]===0) deg++;
        }
        score+=(deg-2)*D.esc;
      }
      if(ring.prev && ni2===ring.prev[0] && nj2===ring.prev[1]) score-=2.5;
      score+=Math.random()*D.rnd;
      opts.push([ni2,nj2,score]);
      if(score>bestScore){bestScore=score;best=[ni2,nj2];}
    }
    if(best){
      ring.prev=[ring.tx,ring.ty];
      ring.tx=best[0]; ring.ty=best[1];
    }
  } else {
    ring.x += dx/d*ring.speed;
    ring.y += dy/d*ring.speed;
  }
  ring.bob+=0.05;
}

function angLerp(a,b,f){
  let d=b-a;
  while(d>Math.PI)d-=2*Math.PI;
  while(d<-Math.PI)d+=2*Math.PI;
  return a+d*f;
}

function drawWalker(w, sprA, sprB, trailState, vis){
  const s = trailState || w;
  const spr = (!trailState && w.air) ? sprA
            : (s.animT!==undefined && Math.floor(s.animT/14)%2===0) ? sprA : sprB;
  const target = Math.atan2(s.n.x, -s.n.y);  // 0 when n=(0,-1)
  let ang = target;
  if(vis){
    if(vis.to===null){ vis.to=target; vis.from=target; vis.t=99; }
    let d=target-vis.to;
    while(d>Math.PI)d-=2*Math.PI; while(d<-Math.PI)d+=2*Math.PI;
    if(Math.abs(d)>0.01){ vis.from=vis.to; vis.to=target; vis.t=0; }
    vis.t++;
    if(vis.t<5){
      // mid-turn: hold the 45-degree halfway pose
      let h=vis.to-vis.from;
      while(h>Math.PI)h-=2*Math.PI; while(h<-Math.PI)h+=2*Math.PI;
      ang = vis.from + h/2;
    } else ang = vis.to;
  }
  ctx.save();
  ctx.translate(Math.round(s.x), Math.round(s.y));
  ctx.rotate(ang);
  const flip = s.face<0 ? -1 : 1;
  ctx.scale(flip,1);
  ctx.drawImage(spr, Math.round(-spr.width/2), -spr.height+2);
  ctx.restore();
}

let frame=0;
// ---------- fixed-timestep loop: simulation always runs at exactly 60 ticks/s,
// rendering runs at the display's refresh rate (smooth at any Hz) ----------
const STEP=1000/60;
let accT=0, lastT=performance.now();
function loop(now){
  requestAnimationFrame(loop);
  if(now===undefined) now=performance.now();
  let dt=now-lastT; lastT=now;
  if(dt>250) dt=STEP;              // hidden tab / long hiccup: don't fast-forward
  accT+=dt;
  const pads=pollPads();
  lastPadCount=pads.length;
  padEdges(pads);
  let ticks=0;
  while(accT>=STEP && ticks<5){ tick(pads); accT-=STEP; ticks++; }
  if(ticks===5) accT=0;            // machine overloaded: drop the backlog
  render();
}
function padEdges(pads){
  for(let i=0;i<pads.length;i++){
    const pad=pads[i];
    if((pad.jump||pad.start||pad.gx||pad.gy) && soundPref()!=='off'){
      if(!actx) initAudio();
      if(actx.state==='suspended') actx.resume().catch(()=>{});
    }
    const prev=padPrev[i]||{a:false,b:false,jump:false,start:false,gy:0,gx:0};
    if(state==='title'){
      if(pad.gy!==0 && (prev.gy||0)===0) titleNav(0,Math.sign(pad.gy));
      if(pad.gx!==0 && (prev.gx||0)===0) titleNav(Math.sign(pad.gx),0);
      if(pad.a&&!prev.a) titleAdvance();
      else if(pad.start&&!prev.start) titleAdvance();
      if(pad.b&&!prev.b) titleBack();
      padPrev[i]={a:pad.a,b:pad.b,jump:pad.jump,start:pad.start,gy:pad.gy,gx:pad.gx};
      continue;
    }
    // pad 0 drives red; pad 1 drives blue in 2P
    const target = (i===0) ? player : (players===2 && blueW && i===1 ? blueW : null);
    if(pad.jump&&!prev.jump){
      if(state==='play' && target) target.jump(J);
      else if(state==='won') reset();
      else if(state==='paused'){ if(pad.b&&!prev.b) state='play'; else pauseConfirm(); }
    }
    // B backs out of the pause menu straight to resume
    if(state==='paused' && pad.b && !prev.b && !(pad.jump&&!prev.jump)) state='play';
    if(target){
      if(pad.jump) target.jheld=true;
      else if(prev.jump) target.jheld=false;
    }
    if(pad.start&&!prev.start){
      if(state==='won') reset();
      else if(state==='paused') pauseConfirm();
      else if(state==='play') togglePause();
    }
    if(state==='paused' && pad.gy!==0 && (prev.gy||0)===0) pauseSel=(pauseSel+1)%2;
    padPrev[i]={a:pad.a,b:pad.b,jump:pad.jump,start:pad.start,gy:pad.gy,gx:pad.gx};
  }
  padPrev.length=pads.length;
}
function tick(pads){
  frame++;
  if(frame%90===0 && actx && actx.state==='suspended' && soundPref()!=='off')
    actx.resume().catch(()=>{});
  if(state==='title'){ titleUpdate(); return; }
  if(state==='play'){
    const kx=(keys.ArrowLeft||keys.KeyA?-1:0)+(keys.ArrowRight||keys.KeyD?1:0);
    const ky=(keys.ArrowUp||keys.KeyW?-1:0)+(keys.ArrowDown||keys.KeyS?1:0);
    const p0=pads[0], p1=pads[1];
    // red: pad 0; in 1P the keyboard and touch drive red too
    let rx=p0?p0.gx:0, ry=p0?p0.gy:0;
    if(players===1){ rx=rx||kx||touchIn.x; ry=ry||ky||touchIn.y; }
    player.drive(rx,ry,ACC,MAX,FRIC,SKID);
    player.airControl(rx,ry);
    player.step();
    if(players===2 && blueW){
      // blue: keyboard (P2), plus pad 1 when two controllers are connected
      let bx=kx||touchIn.x, by=ky||touchIn.y;
      if(p1){ bx=bx||p1.gx; by=by||p1.gy; }
      blueW.drive(bx,by,ACC,MAX,FRIC,SKID);
      blueW.airControl(bx,by);
      blueW.step();
    } else {
      trail.push({x:player.x,y:player.y,n:{...player.n},face:player.face,animT:player.animT,air:player.air});
      if(trail.length>400) trail.shift();
    }
    if(frame%20===0) bfs();
    ringStep();
    // catch check: either player can take the ring
    for(const w of (blueW?[player,blueW]:[player])){
      const cx2=w.x+w.n.x*20, cy2=w.y+w.n.y*20;
      if(Math.hypot(cx2-ring.x, cy2-ring.y) < 30){
        state='won';
        winFx={x:ring.x, y:ring.y, t:0, holder:w};
        if(music&&!music.muted) jingle();
        break;
      }
    }
  }
  if(state==='won' && winFx) winFx.t++;
}
function soundHint(){
  if(actx && actx.state==='suspended' && music && !music.muted && lastPadCount>0 && frame%80<55)
    pixText(ctx,'CLICK FOR SOUND', WNAT/2, HNAT-5*4-10, 4, F35,3,5, '#c8b890','#8a7758', true);
}
function render(){
  if(state==='title'){
    // --- render title ---
    ctx.fillStyle='#070402'; ctx.fillRect(0,0,WNAT,HNAT);
    ctx.drawImage(dirtFor(LAY.title),0,0);
    // blue trails, red chases
    const tbs=trailFollow();
    if(tbs) drawWalker(null,SPR.blueA,SPR.blueB,tbs,blueVis);
    drawWalker(null,SPR.redA,SPR.redB,
      {x:tRed.x,y:tRed.y,n:tRed.n,face:tRed.face,animT:tRed.animT},redVis);
    // the ring hovers just off its surface, glowing
    const rx=tRing.x+tRing.n.x*26, ry=tRing.y+tRing.n.y*26 + Math.sin(frame*0.08)*2;
    const gg=ctx.createRadialGradient(rx,ry,4,rx,ry,70);
    gg.addColorStop(0,'rgba(255,230,150,0.20)'); gg.addColorStop(1,'rgba(255,230,150,0)');
    ctx.fillStyle=gg; ctx.fillRect(rx-70,ry-70,140,140);
    ctx.drawImage(SPR.ring, Math.round(rx-SPR.ring.width/2), Math.round(ry-SPR.ring.height/2));
    // logo on the island
    const logoH = 2*7*LAY.logoPx + 10;                 // two lines + gap
    const logoY = ISL.y0 + (ISLH - logoH)/2;           // centred on the block
    pixText(ctx,'RING', WNAT/2, logoY, LAY.logoPx, F57,5,7, '#f8d838','#c8952c', true);
    pixText(ctx,'CHASE',WNAT/2, logoY+7*LAY.logoPx+10, LAY.logoPx, F57,5,7, '#f8d838','#c8952c', true);
    if(titlePhase==='mode'){
      // -------- game-mode selector --------
      const px=LAY.promptPx;
      const opts=['FOLLOW THE LEADER','SOLO'];
      for(let i=0;i<2;i++){
        const y=ISL.y1+1.5*T + i*(5*px+14);
        const sel=i===modeSel;
        pixText(ctx,(sel?'> ':'  ')+opts[i]+(sel?' <':'  '), WNAT/2, y, px, F35,3,5,
                sel?'#f8f0dc':'#7d6a50', sel?'#c8b890':'#5e5040', true);
      }
    } else if(titlePhase==='char'){
      // -------- simple hero selector --------
      const px=LAY.promptPx;
      pixText(ctx,'PLAYER 1', WNAT/2, ISL.y1+1.1*T, px, F35,3,5, '#f8f0dc','#c8b890', true);
      const sc=1.6, gap=WNAT*0.16;
      const chars=[{spr:SPR.redA},{spr:SPR.blueA}];
      const baseY=ISL.y1+1.1*T + 5*px + 18;
      for(let i=0;i<2;i++){
        const spr=chars[i].spr;
        const w=spr.width*sc, h=spr.height*sc;
        const cxx=WNAT/2 + (i===0?-gap:gap);
        const sel=i===charSel;
        const bob=sel?Math.sin(frame*0.12)*3:0;
        ctx.save();
        ctx.globalAlpha=sel?1:0.42;
        ctx.imageSmoothingEnabled=false;
        ctx.drawImage(spr, Math.round(cxx-w/2), Math.round(baseY+bob), Math.round(w), Math.round(h));
        ctx.restore();
        if(sel){
          pixText(ctx,'>', cxx-w/2-14, baseY+h*0.4, px, F35,3,5, '#f8d838','#c8952c', true);
          pixText(ctx,'<', cxx+w/2+14, baseY+h*0.4, px, F35,3,5, '#f8d838','#c8952c', true);
        }
      }
    } else if(titlePhase==='settings'){
      // -------- settings panel (left/right changes, A saves, B cancels) --------
      const px=LAY.promptPx;
      const rows=['MUSIC   '+(wSound?'ON':'OFF'),
                  'DIFFICULTY   '+DIFFS[wDiff].name];
      for(let i=0;i<2;i++){
        const y=ISL.y1+1.5*T + i*(5*px+16);
        const sel=i===setSel;
        pixText(ctx,(sel?'> ':'  ')+rows[i]+(sel?' <':'  '), WNAT/2, y, px, F35,3,5,
                sel?'#f8f0dc':'#7d6a50', sel?'#c8b890':'#5e5040', true);
      }
    } else {
      // -------- main menu list --------
      const px=LAY.promptPx;
      const it=menuItems();
      if(menuSel>=it.length) menuSel=it.length-1;
      for(let i=0;i<it.length;i++){
        const y=ISL.y1+1.4*T + i*(5*px+14);
        const sel=i===menuSel;
        pixText(ctx,(sel?'> ':'  ')+it[i]+(sel?' <':'  '), WNAT/2, y, px, F35,3,5,
                sel?'#f8f0dc':'#7d6a50', sel?'#c8b890':'#5e5040', true);
      }
    }
    // footer hint on sub-screens
    if(titlePhase!=='menu'){
      const px=Math.max(3,LAY.promptPx-1);
      const hint = titlePhase==='settings' ? 'CHANGE   A SAVE   B CANCEL' : 'A SELECT   B BACK';
      pixText(ctx,hint, WNAT/2, HNAT-6*px, px, F35,3,5, '#8a7758','#5e5040', true);
    }
    // cozy vignette
    const tv=ctx.createRadialGradient(WNAT/2,HNAT/2,HNAT*0.45,WNAT/2,HNAT/2,HNAT*1.05);
    tv.addColorStop(0,'rgba(0,0,0,0)'); tv.addColorStop(1,'rgba(15,6,0,0.30)');
    ctx.fillStyle=tv; ctx.fillRect(0,0,WNAT,HNAT);
    soundHint();
    return;
  }

  // render
  ctx.fillStyle='#070402';
  ctx.fillRect(0,0,WNAT,HNAT);
  ctx.drawImage(dirtFor(LAY.maze),0,0);

  // ring (not animated, just moves) with a soft warm glow.
  // once caught, the world ring disappears — it's drawn in the player's hands instead
  if(state!=='won'){
    const g=ctx.createRadialGradient(ring.x,ring.y,4,ring.x,ring.y,70);
    g.addColorStop(0,'rgba(255,230,150,0.20)'); g.addColorStop(1,'rgba(255,230,150,0)');
    ctx.fillStyle=g; ctx.fillRect(ring.x-70,ring.y-70,140,140);
    ctx.drawImage(SPR.ring, Math.round(ring.x-SPR.ring.width/2), Math.round(ring.y-SPR.ring.height/2));
  }

  // sprite assignment: in 1P the chosen hero is player-controlled, the other follows
  const heroRed = players===2 || p1Char==='red';
  const P1S = heroRed ? {a:SPR.redA,b:SPR.redB,vis:redVis} : {a:SPR.blueA,b:SPR.blueB,vis:blueVis};
  const P2S = heroRed ? {a:SPR.blueA,b:SPR.blueB,vis:blueVis} : {a:SPR.redA,b:SPR.redB,vis:redVis};
  if(players===2 && blueW){
    drawWalker(blueW, P2S.a, P2S.b, null, P2S.vis);
  } else if(!soloMode){
    // follow-the-leader: the other character trails behind
    const bs = trailFollow();
    if(bs) drawWalker(null, P2S.a, P2S.b, bs, P2S.vis);
    else drawWalker(null, P2S.a, P2S.b, {x:LAY.blueIdle.x*T,y:LAY.blueIdle.y*T,n:{x:0,y:-1},face:1,animT:0}, P2S.vis);
  }
  // solo: no trailing buddy drawn at all
  drawWalker(player, P1S.a, P1S.b, null, P1S.vis);

  // gentle warm vignette (warmth lives in the dirt palette; corridors stay deep dark)
  const vg=ctx.createRadialGradient(WNAT/2,HNAT/2,HNAT*0.45,WNAT/2,HNAT/2,HNAT*1.05);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(15,6,0,0.30)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,WNAT,HNAT);
  soundHint();

  if(state==='paused'){
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,WNAT,HNAT);
    ctx.textAlign='center';
    const fp=Math.min(46, WNAT*0.075);
    ctx.font='bold '+fp+'px monospace';
    ctx.fillStyle='#1a0d04'; ctx.fillText('PAUSED', WNAT/2+3, HNAT/2-fp*1.1+3);
    ctx.fillStyle='#f8e8b0'; ctx.fillText('PAUSED', WNAT/2, HNAT/2-fp*1.1);
    const px=LAY.promptPx;
    const opts=['RESUME','MAIN MENU'];
    for(let i=0;i<2;i++){
      const y=HNAT/2 - fp*0.4 + i*(5*px+14);
      const sel=i===pauseSel;
      pixText(ctx,(sel?'> ':'  ')+opts[i]+(sel?' <':'  '), WNAT/2, y, px, F35,3,5,
              sel?'#f8f0dc':'#7d6a50', sel?'#c8b890':'#5e5040', true);
    }
  }

  if(state==='won'){
    // win burst: bold full-screen 16-pointed star, concentric thick bands,
    // emanating from the catch point then flashing red / white / yellow
    if(winFx){
      const ease=p=>1-Math.pow(1-p,3);
      const grow=ease(Math.min(winFx.t/20,1));
      const R=Math.max(WNAT,HNAT)*0.82*grow;   // gold band reaches past screen edges
      if(R>6){
        const FS=6;                            // chunky pixel-step size
        const ec=winFx.cv||(winFx.cv=document.createElement('canvas'));
        ec.width=Math.ceil(WNAT/FS); ec.height=Math.ceil(HNAT/FS);
        const g=ec.getContext('2d');
        const cx=winFx.x/FS, cy=winFx.y/FS, RR=R/FS;
        function star(scale){
          g.beginPath();
          for(let i=0;i<32;i++){
            const a=-Math.PI/2 + i*Math.PI/16;
            const rad=(i%2===0?RR:RR*0.52)*scale;
            const x=cx+Math.cos(a)*rad, y=cy+Math.sin(a)*rad;
            i?g.lineTo(x,y):g.moveTo(x,y);
          }
          g.closePath();
        }
        const punch=s=>{g.globalCompositeOperation='destination-out';star(s);g.fill();
                        g.globalCompositeOperation='source-over';};
        const FLASH=['#d96a5e','#f8f8f4','#f8d838'];
        const f=Math.floor(winFx.t/6);
        // gold band gradient (olive top -> bright gold bottom)
        const gold=g.createLinearGradient(0,0,0,ec.height);
        gold.addColorStop(0,'#a89030'); gold.addColorStop(1,'#f0d848');
        g.clearRect(0,0,ec.width,ec.height);
        // three concentric star bands, fully transparent between them
        g.fillStyle=FLASH[(f+2)%3]; star(1.34); g.fill();  // outermost band
        punch(1.10);
        g.fillStyle=gold; star(1.00); g.fill();            // huge gold band
        punch(0.62);
        g.fillStyle=FLASH[f%3]; star(0.37); g.fill();      // inner salmon star
        punch(0.21);                                        // open center around the pair
        // snap edge alpha so the upscale gives hard pixel steps
        const id=g.getImageData(0,0,ec.width,ec.height);
        for(let p=3;p<id.data.length;p+=4) id.data[p]=id.data[p]>127?255:0;
        g.putImageData(id,0,0);
        ctx.imageSmoothingEnabled=false;
        ctx.drawImage(ec,0,0,ec.width,ec.height,0,0,ec.width*FS,ec.height*FS);
      }
      // the champion holds the ring overhead
      const champ=(winFx&&winFx.holder)||player;
      const rx=champ.x+champ.n.x*54, ry=champ.y+champ.n.y*54;
      ctx.drawImage(SPR.ring, Math.round(rx-SPR.ring.width/2), Math.round(ry-SPR.ring.height/2));
    }
    ctx.textAlign='center';
    const fw=Math.min(52, WNAT*0.082);
    ctx.font='bold '+fw+'px monospace';
    ctx.fillStyle='#1a0d04';
    ctx.fillText('YOU CAUGHT THE RING!', WNAT/2+3, HNAT/2-7);
    ctx.fillStyle='#f8e8b0';
    ctx.fillText('YOU CAUGHT THE RING!', WNAT/2, HNAT/2-10);
    ctx.font=Math.min(24, WNAT*0.04)+'px monospace';
    ctx.fillStyle='#1a0d04';
    ctx.fillText('press A / R to play again', WNAT/2+2, HNAT/2+fw*0.75+2);
    ctx.fillStyle='#f8e8b0';
    ctx.fillText('press A / R to play again', WNAT/2, HNAT/2+fw*0.75);
  }
}
try{ const d=parseInt(localStorage.getItem('rc_diff')); if(d>=0&&d<DIFFS.length) diffSel=d; }catch(e){}
enterTitle(preferredLayout());
applyLayout();
if(soundPref()==='on'){
  initAudio();
  actx.resume().catch(()=>{});
  if(music&&actx){ music.ptr=[0,0,0]; music.loopStart=actx.currentTime+0.15; }
}
loop();
</script>
